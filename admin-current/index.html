<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虚拟直播运营后台复刻版</title>
    <link rel="stylesheet" href="./styles.css?v=phase2-ops-script-import-20260712b" />
    <link rel="stylesheet" href="./robot-ops.css?v=phase2-ops-script-import-20260712b" />
    <link rel="stylesheet" href="./live-dashboard.css" />
  </head>
  <body>
    <div id="app" class="admin-shell">
      <aside class="sidebar">
        <div class="menu-title commerce-menu-title">
          <span class="doc-icon"></span>
          <span>商城管理</span>
          <span class="chevron">⌃</span>
        </div>
        <nav id="shopNav" class="side-nav commerce-side-nav"></nav>
        <div class="menu-title">
          <span class="doc-icon"></span>
          <span>虚拟直播管理</span>
          <span class="chevron">⌃</span>
        </div>
        <nav id="sideNav" class="side-nav"></nav>
      </aside>

      <section class="main">
        <header class="topbar">
          <button class="icon-button" type="button" aria-label="折叠菜单" onclick="toggleSidebar()">☰</button>
          <div class="breadcrumb">Dashboard <span>/</span> <span id="breadcrumbModule">虚拟直播管理</span> <span>/</span> <strong id="breadcrumbPage">机器人管理</strong></div>
          <div class="top-actions">
            <label class="channel-switcher"><span>当前渠道</span><select id="channelSelector" onchange="phase2State.setChannel(this.value)"><option value="channel-weishi">微视中国（平台）</option><option value="channel-culture">国风文旅（客户）</option></select></label>
            <span class="channel-role" id="channelRole">平台渠道 · 最高权限</span>
            <button class="btn secondary top-reset-button" type="button" onclick="phase2State.reset()">重置演示数据</button>
            <button id="handoffToggle" class="handoff-toggle" type="button" onclick="toggleHandoffMode()">交付标注</button>
            <button class="notify" type="button">♜<span></span></button>
            <div class="user-avatar"></div>
          </div>
        </header>
        <div id="tabbar" class="tabbar"></div>
        <main id="content" class="content"></main>
      </section>
    </div>

    <div id="modalRoot"></div>
    <div id="handoffModalRoot"></div>
    <div id="handoffOverlayRoot"></div>
    <div id="toast" class="toast"></div>
    <script src="./feature-list-data.js"></script>
    <script src="./phase2-state.js"></script>
    <script src="./robot-ops.js?v=phase2-ops-script-import-20260712b"></script>
    <script src="./live-dashboard.js"></script>
    <script src="./app.js?v=phase2-ops-script-import-20260712c"></script>
  </body>
</html>
