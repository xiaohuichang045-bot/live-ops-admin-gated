<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虚拟直播运营后台演示</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: auto;
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.94)),
          #0f172a;
      }

      body.gate-locked {
        height: 100%;
        overflow: hidden;
      }

      .gate {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .gate.is-hidden {
        display: none;
      }

      .gate-card {
        width: min(430px, 100%);
        padding: 28px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.84);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .gate-card h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .gate-card p {
        margin: 0 0 20px;
        color: #cbd5e1;
        font-size: 14px;
        line-height: 1.6;
      }

      .gate-form {
        display: grid;
        gap: 12px;
      }

      .gate-form label {
        color: #e2e8f0;
        font-size: 13px;
        font-weight: 600;
      }

      .gate-form input {
        width: 100%;
        box-sizing: border-box;
        height: 42px;
        padding: 0 12px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 6px;
        outline: none;
        background: #f8fafc;
        color: #0f172a;
        font-size: 15px;
      }

      .gate-form input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
      }

      .gate-form button {
        height: 42px;
        border: 0;
        border-radius: 6px;
        background: #38bdf8;
        color: #082f49;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
      }

      .gate-form button:hover {
        background: #7dd3fc;
      }

      .answer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .answer-option {
        min-height: 42px;
        border: 1px solid rgba(148, 163, 184, 0.55);
        border-radius: 6px;
        background: rgba(248, 250, 252, 0.96);
        color: #0f172a;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
      }

      .answer-option:hover,
      .answer-option:focus {
        border-color: #38bdf8;
        background: #e0f2fe;
        outline: none;
      }

      .answer-option:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .gate-message {
        min-height: 18px;
        margin: 0;
        color: #fca5a5;
        font-size: 13px;
      }

      .loading {
        color: #cbd5e1;
      }
    </style>
  </head>

        <form class="gate-form" id="gateForm">
          <label>选择答案</label>
          <div class="answer-grid" id="answerGrid">

          </div>
          <p class="gate-message" id="gateMessage" aria-live="polite"></p>
        </form>
      </section>

    <script>
      (() => {
        const sessionKeyPrefix = "liveOpsEncryptedBundle";
        const payloadUrl = "./payload.json";
        const textDecoder = new TextDecoder();
        const gate = document.getElementById("gate");
        const form = document.getElementById("gateForm");
        const answerGrid = document.getElementById("answerGrid");
        const answerButtons = Array.from(document.querySelectorAll(".answer-option"));
        const message = document.getElementById("gateMessage");
        const loading = document.getElementById("loading");
        const mount = document.getElementById("appMount");
        const inlinePayload = document.getElementById("encryptedPayload");

        function bytesFromBase64(value) {
          const binary = atob(value);
          const bytes = new Uint8Array(binary.length);
          for (let index = 0; index < binary.length; index += 1) {
            bytes[index] = binary.charCodeAt(index);
          }
          return bytes;
        }

        function bytesToText(value) {
          return textDecoder.decode(bytesFromBase64(value));
        }

        function normalizePath(value) {
          return value
            .split("?")[0]
            .replace(/^\.\//, "")
            .replace(/^\/+/, "");
        }

        async function deriveKey(password, salt, iterations) {
          const baseKey = await crypto.subtle.importKey(
            "raw",
            new TextEncoder().encode(password),
            "PBKDF2",
            false,
            ["deriveKey"],
          );

          return crypto.subtle.deriveKey(
            {
              name: "PBKDF2",
              salt,
              iterations,
              hash: "SHA-256",
            },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"],
          );
        }

        function parseInlinePayload() {
          const value = inlinePayload?.textContent?.trim();
          if (!value || value === "__ENCRYPTED_PAYLOAD_JSON__") return null;
          try {
            return JSON.parse(value);
          } catch (error) {
            throw new Error("payload_unavailable");
          }
        }

        async function loadPayload() {
          const payload = parseInlinePayload();
          if (payload) return payload;

          try {
            const response = await fetch(payloadUrl, { cache: "no-store" });
            if (!response.ok) {
              throw new Error("payload_unavailable");
            }
            return await response.json();
          } catch (error) {
            throw new Error("payload_unavailable");
          }
        }

        function sessionKeyForPayload(payload) {
          return [
            sessionKeyPrefix,
            payload.version || "v1",
            payload.compression || "plain",
            payload.iterations || "0",
            payload.salt || "",
            payload.iv || "",
            String(payload.data || "").length,
          ].join(":");
        }

        async function decodeBundleText(decrypted, payload) {
          if (payload.compression !== "gzip") {
            return textDecoder.decode(new Uint8Array(decrypted));
          }
          if (!("DecompressionStream" in window)) {
            throw new Error("browser_unsupported");
          }
          const stream = new Blob([decrypted]).stream().pipeThrough(new DecompressionStream("gzip"));
          return new Response(stream).text();
        }

        async function decryptBundle(password) {
          const payload = await loadPayload();
          const key = await deriveKey(
            password.trim(),
            bytesFromBase64(payload.salt),
            payload.iterations,
          );
          const decrypted = await crypto.subtle.decrypt(
            {
              name: "AES-GCM",
              iv: bytesFromBase64(payload.iv),
            },
            key,
            bytesFromBase64(payload.data),
          );

          return {
            bundleText: await decodeBundleText(decrypted, payload),
            sessionKey: sessionKeyForPayload(payload),
          };
        }

        function createFileUrls(bundle) {
          const urls = {};

          for (const [path, file] of Object.entries(bundle.files)) {
            if (path.endsWith(".js")) continue;
            urls[path] = URL.createObjectURL(
              new Blob([bytesFromBase64(file.content)], { type: file.mime }),
            );
          }

          for (const [path, file] of Object.entries(bundle.files)) {
            if (!path.endsWith(".js")) continue;
            let source = bytesToText(file.content);
            for (const [assetPath, assetUrl] of Object.entries(urls)) {
              source = source.replaceAll(`./${assetPath}`, assetUrl);
              source = source.replaceAll(assetPath, assetUrl);
            }
            urls[path] = URL.createObjectURL(
              new Blob([source], { type: file.mime }),
            );
          }

          return urls;
        }

        function appendStyles(parsedDocument, urls) {
          for (const node of parsedDocument.querySelectorAll("link[rel='stylesheet'][href]")) {
            const path = normalizePath(node.getAttribute("href"));
            const href = urls[path];
            if (!href) continue;
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = href;
            document.head.appendChild(link);
          }
        }

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });
        }

        function installBlobFetchPatch() {
          if (window.__liveOpsBlobFetchPatchInstalled) return;
          const nativeFetch = window.fetch.bind(window);
          window.fetch = (input, init) => {
            if (typeof input === "string" && input.startsWith("blob:") && input.includes("?")) {
              return nativeFetch(input.split("?")[0], init);
            }
            if (input instanceof Request && input.url.startsWith("blob:") && input.url.includes("?")) {
              return nativeFetch(input.url.split("?")[0], input);
            }
            return nativeFetch(input, init);
          };
          window.__liveOpsBlobFetchPatchInstalled = true;
        }

        async function appendScripts(parsedDocument, urls) {
          for (const node of parsedDocument.querySelectorAll("script[src]")) {
            const path = normalizePath(node.getAttribute("src"));
            const src = urls[path];
            if (!src) continue;
            await loadScript(src);
          }
        }

        async function hydrate(bundleText) {
          const bundle = JSON.parse(bundleText);
          const urls = createFileUrls(bundle);
          const html = bytesToText(bundle.files["index.html"].content);
          const parsedDocument = new DOMParser().parseFromString(html, "text/html");

          installBlobFetchPatch();
          appendStyles(parsedDocument, urls);
          mount.innerHTML = parsedDocument.body.innerHTML;
          gate.classList.add("is-hidden");
          loading.hidden = true;
          document.body.classList.remove("gate-locked");
          await appendScripts(parsedDocument, urls);
        }

        async function unlockWith(password) {
          answerButtons.forEach((button) => {
            button.disabled = true;
          });
          message.textContent = "";
          loading.hidden = false;

          try {
            const { bundleText, sessionKey } = await decryptBundle(password);
            sessionStorage.setItem(sessionKey, bundleText);
            await hydrate(bundleText);
          } catch (error) {
            message.textContent =
              error.message === "payload_unavailable"
                ? "演示资源加载失败，请刷新或重新下载演示包。"
                : error.message === "browser_unsupported"
                  ? "当前浏览器版本过旧，请换用新版 Chrome、Edge 或 Safari 打开。"
                : "答案不对，再想想机器人直播最怕什么。";
            loading.hidden = true;
          } finally {
            answerButtons.forEach((button) => {
              button.disabled = false;
            });
          }
        }

        window.addEventListener("DOMContentLoaded", async () => {
          let cachedBundle = "";
          try {
            cachedBundle = sessionStorage.getItem(sessionKeyForPayload(await loadPayload())) || "";
          } catch (error) {
            cachedBundle = "";
          }
          if (cachedBundle) {
            await hydrate(cachedBundle);
            return;
          }
          answerButtons[0]?.focus();
        });

        form.addEventListener("submit", (event) => {
          event.preventDefault();
        });

        answerGrid.addEventListener("click", (event) => {
          const option = event.target.closest("[data-answer]");
          if (!option) return;
          unlockWith(option.dataset.answer);
        });
      })();
    </script>
